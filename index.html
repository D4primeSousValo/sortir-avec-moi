<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veux-tu sortir avec moi ? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:white;
    font-size:3rem;
    margin-bottom:50px;
}

button{
    padding:15px 40px;
    font-size:24px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    transition:.2s;
}

#yes{
    background:#4CAF50;
    color:white;
    margin-right:20px;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    position:absolute;
    background:#ff4444;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Veux-tu sortir avec moi ? ❤️</h1>

    <button id="yes">Oui</button>
    <button id="no">Non</button>
</div>

<script>

const no = document.getElementById("no");

no.style.left="60%";
no.style.top="55%";

function move(){

    const x=Math.random()*(window.innerWidth-120);
    const y=Math.random()*(window.innerHeight-60);

    no.style.left=x+"px";
    no.style.top=y+"px";
}

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    move();
});

document.getElementById("yes").onclick=()=>{

document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ff7eb3;color:white;font-family:Arial;text-align:center;flex-direction:column;">
<h1 style="font-size:65px;">🎉 Félicitations 🎉</h1>
<h2>Tu as accepté ! ❤️</h2>
<p style="font-size:28px;margin-top:20px;">Maintenant envoie-moi un meme 😎</p>
</div>
`;

}

</script>

</body>
</html>
